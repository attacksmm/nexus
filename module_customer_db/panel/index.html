<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>База клиентов</title>
  <style>
    :root {
      --bg:#060606;--panel:#101010;--panel-strong:#171717;--panel-soft:#1d1d1d;
      --text:#f2f2f2;--text-muted:#bababa;--text-subtle:#848484;
      --border:#2d2d2d;--border-mid:#3a3a3a;--border-strong:#545454;
      --accent-bg:#f4f4f4;--accent-text:#080808;
      --ok:#9fe0aa;--ok-bg:#102417;--ok-bd:#315f3a;
      --bad:#ffc2ca;--bad-bg:#251315;--bad-bd:#5f3137;
      font-family:"IBM Plex Sans","Segoe UI",system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;}
    [hidden]{display:none!important;}
    html,body{margin:0;width:100%;height:100%;max-width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-size:14px;color-scheme:dark;}
    button,input,textarea,select{font:inherit;}
    *{scrollbar-color:var(--border-strong) #080808;scrollbar-width:thin;}
    ::-webkit-scrollbar{width:8px;height:8px;}
    ::-webkit-scrollbar-track{background:#080808;}
    ::-webkit-scrollbar-thumb{background:var(--border-strong);border:2px solid #080808;}
    ::-webkit-scrollbar-corner{background:#080808;}
    *::-webkit-scrollbar{width:8px;height:8px;}
    *::-webkit-scrollbar-track{background:#080808;}
    *::-webkit-scrollbar-thumb{background:var(--border-strong);border:2px solid #080808;}
    *::-webkit-scrollbar-corner{background:#080808;}
    .scroll-zone{scrollbar-width:none;-ms-overflow-style:none;}
    .scroll-zone::-webkit-scrollbar{display:none;width:0;height:0;}

    .shell{width:100vw;max-width:100%;height:100vh;min-width:0;overflow:hidden;display:grid;grid-template-rows:auto minmax(0,1fr) auto;}

    /* toolbar */
    .toolbar{display:flex;align-items:center;gap:8px;padding:0 10px;height:42px;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;min-width:0;overflow:hidden;}
    .toolbar__divider{width:1px;height:20px;background:var(--border-mid);margin:0 2px;flex-shrink:0;}
    .toolbar__stats{margin-left:auto;color:var(--text-subtle);font-size:.76rem;flex-shrink:0;}

    /* table selector */
    .table-tabs{display:flex;align-items:center;gap:4px;flex:1;min-width:0;overflow-x:auto;overflow-y:hidden;}
    .table-tab{
      display:inline-flex;align-items:center;gap:6px;padding:4px 10px;
      border:1px solid transparent;background:transparent;color:var(--text-muted);
      cursor:pointer;font-size:.82rem;white-space:nowrap;flex-shrink:0;
    }
    .table-tab:hover{border-color:var(--border);background:var(--panel-strong);}
    .table-tab--active{border-color:var(--border-mid)!important;background:var(--panel-soft)!important;color:var(--text);}
    .table-tab__del{opacity:.5;margin-left:2px;font-size:.9em;}
    .table-tab__del:hover{opacity:1;color:var(--bad);}

    /* table */
    .table-wrap{overflow:auto;min-width:0;}
    table{width:100%;min-width:720px;border-collapse:collapse;font-size:.83rem;}
    th,td{padding:7px 10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:top;}
    th{color:var(--text-subtle);font-weight:500;background:var(--panel);position:sticky;top:0;z-index:1;}
    tr:hover td{background:var(--panel-strong);}
    .cf-badge{display:inline-block;padding:1px 5px;border:1px solid var(--border-mid);color:var(--text-subtle);font-size:.71rem;margin:0 2px 2px 0;}

    /* pagination */
    .pagination{display:flex;align-items:center;gap:8px;padding:7px 10px;border-top:1px solid var(--border);background:var(--panel);font-size:.78rem;color:var(--text-muted);min-width:0;overflow:hidden;}
    .pagination__spacer{flex:1;}

    /* buttons */
    .btn{display:inline-flex;align-items:center;justify-content:center;min-height:28px;padding:4px 10px;border:1px solid var(--border-strong);background:var(--panel-strong);color:var(--text);cursor:pointer;white-space:nowrap;font-size:.8rem;}
    .btn:disabled{opacity:.35;cursor:default;}
    .btn--primary{background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent-bg);}
    .btn--danger{background:var(--bad-bg);border-color:var(--bad-bd);color:var(--bad);}
    .btn--ghost{background:transparent;border-color:var(--border);color:var(--text-muted);}
    .btn--xs{min-height:22px;padding:1px 6px;font-size:.73rem;}

    /* search */
    .search{flex:1 1 170px;max-width:260px;min-width:120px;min-height:28px;padding:4px 8px;border:1px solid var(--border-strong);background:#090909;color:var(--text);}

    /* overlay */
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:grid;place-items:center;padding:16px;z-index:50;}
    .dialog{width:min(520px,100%);background:var(--panel);border:1px solid var(--border-strong);box-shadow:0 24px 80px rgba(0,0,0,.55);}
    .dialog__head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border);}
    .dialog__head h2{margin:0;font-size:.95rem;font-weight:600;}
    .dialog__body{padding:14px;display:grid;gap:10px;max-height:65vh;overflow-y:auto;}
    .dialog__foot{padding:10px 14px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
    .eyebrow{margin:0 0 2px;color:var(--text-subtle);text-transform:uppercase;letter-spacing:.12em;font-size:.63rem;}
    .form-label{display:grid;gap:4px;color:var(--text-muted);font-size:.8rem;}
    .form-input{width:100%;min-height:32px;padding:5px 8px;border:1px solid var(--border-strong);background:#090909;color:var(--text);}
    .form-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .cf-editor{display:grid;gap:6px;}
    .cf-row{display:grid;grid-template-columns:1fr 1fr auto;gap:6px;align-items:center;}
    .status-line{margin:0;color:var(--text-subtle);font-size:.78rem;min-height:16px;}
    .status-line--ok{color:var(--ok);}
    .status-line--err{color:var(--bad);}
  </style>
</head>
<body>
<div class="shell">

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="table-tabs scroll-zone" id="tableTabs"></div>
    <div class="toolbar__divider"></div>
    <button id="newTableBtn" class="btn btn--ghost btn--xs" type="button" title="Новая таблица">+ Таблица</button>
    <div class="toolbar__divider"></div>
    <button id="addRecordBtn" class="btn btn--primary btn--xs" type="button">+ Запись</button>
    <input id="searchInput" class="search" type="search" placeholder="Поиск…" />
    <button id="searchBtn" class="btn btn--xs" type="button">↵</button>
    <button id="refreshBtn" class="btn btn--xs btn--ghost" type="button">↻</button>
    <span id="statsLine" class="toolbar__stats"></span>
  </div>

  <!-- Table -->
  <div class="table-wrap scroll-zone">
    <table>
      <thead id="tableHead"><tr><th>id</th><th>platform_id</th><th>Поля</th><th>Создан</th><th></th></tr></thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <!-- Pagination -->
  <div class="pagination">
    <button id="prevBtn" class="btn btn--xs" type="button" disabled>‹</button>
    <span id="pageInfo">—</span>
    <button id="nextBtn" class="btn btn--xs" type="button" disabled>›</button>
    <span class="pagination__spacer"></span>
    <span id="totalInfo"></span>
  </div>
</div>

<!-- Record dialog -->
<div id="recDialog" class="overlay" hidden>
  <div class="dialog">
    <div class="dialog__head">
      <div><p class="eyebrow">Клиент</p><h2 id="recTitle">Новая запись</h2></div>
      <button id="recClose" class="btn btn--xs btn--ghost" type="button">×</button>
    </div>
    <div class="dialog__body scroll-zone">
      <input id="recId" type="hidden" />
      <label class="form-label">platform_id
        <input id="recPlatformId" class="form-input" placeholder="ID на платформе (VK, TG, …)" />
      </label>
      <div>
        <p class="eyebrow" style="margin-bottom:6px">custom_fields</p>
        <div class="cf-editor" id="cfEditor"></div>
        <button id="cfAddRow" class="btn btn--xs btn--ghost" type="button" style="margin-top:6px">+ поле</button>
      </div>
      <p id="recStatus" class="status-line"></p>
    </div>
    <div class="dialog__foot">
      <button id="recSave" class="btn btn--primary" type="button">Сохранить</button>
    </div>
  </div>
</div>

<!-- New table dialog -->
<div id="tblDialog" class="overlay" hidden>
  <div class="dialog">
    <div class="dialog__head">
      <div><p class="eyebrow">Таблицы</p><h2>Новая таблица</h2></div>
      <button id="tblClose" class="btn btn--xs btn--ghost" type="button">×</button>
    </div>
    <div class="dialog__body scroll-zone">
      <label class="form-label">Системное имя (латиница, _)
        <input id="tblName" class="form-input" placeholder="vk_clients" />
      </label>
      <label class="form-label">Название
        <input id="tblDisplay" class="form-input" placeholder="Клиенты ВКонтакте" />
      </label>
      <label class="form-label">Описание
        <input id="tblDesc" class="form-input" placeholder="Необязательно" />
      </label>
      <p id="tblStatus" class="status-line"></p>
    </div>
    <div class="dialog__foot">
      <button id="tblSave" class="btn btn--primary" type="button">Создать</button>
    </div>
  </div>
</div>

<script>
// Определяем базовый путь из URL страницы
// iframe src = /nexus/customer-db/panel/index.html
// API = /nexus/customer-db/api/
const pathParts = location.pathname.split("/");
// ищем "panel" и берём всё до него
const panelIdx = pathParts.indexOf("panel");
const BASE = panelIdx > 0 ? pathParts.slice(0, panelIdx).join("/").replace(/\/$/, "") : "";
const API = BASE.replace(/\/panel$/, "") + "/api";

let currentTable = "default";
let offset = 0, total = 0, query = "";
const LIMIT = 50;

const $ = id => document.getElementById(id);
const SAFE_TABLE = /^[a-zA-Z][a-zA-Z0-9_]{0,63}$/;

function tableFromHash() {
  const raw = decodeURIComponent((location.hash || "").replace(/^#\/?/, "")).trim();
  return SAFE_TABLE.test(raw) ? raw : "default";
}

function setCurrentTable(name, syncPath = true) {
  currentTable = SAFE_TABLE.test(name) ? name : "default";
  offset = 0;
  query = "";
  if (syncPath) syncModulePath();
}

function syncModulePath() {
  const path = currentTable === "default" ? "" : currentTable;
  window.parent?.postMessage({type:"nexus:set-module-path", moduleId:"customer-db", path}, location.origin);
}

// ── Pointer-local scrolling without visible scrollbars ───────────────────────

function canScroll(el, axis) {
  if (!el) return false;
  if (axis === "x") return el.scrollWidth > el.clientWidth + 1;
  return el.scrollHeight > el.clientHeight + 1;
}

function installHoverScroll() {
  document.addEventListener("wheel", event => {
    const zone = event.target.closest?.(".scroll-zone");
    if (!zone) return;
    const xScrollable = canScroll(zone, "x");
    const yScrollable = canScroll(zone, "y");
    if (!xScrollable && !yScrollable) return;
    const wantsHorizontal = Math.abs(event.deltaX) > Math.abs(event.deltaY) || event.shiftKey || !yScrollable;
    if (wantsHorizontal && xScrollable) {
      zone.scrollLeft += event.deltaX || event.deltaY;
      event.preventDefault();
      return;
    }
    if (yScrollable) {
      zone.scrollTop += event.deltaY;
      if (event.deltaX && xScrollable) zone.scrollLeft += event.deltaX;
      event.preventDefault();
    }
  }, { passive: false });
}

installHoverScroll();

// ── Tables ────────────────────────────────────────────────────────────────────

async function loadTables() {
  const res = await fetch(API + "/tables");
  const tables = await res.json();
  const tabs = $("tableTabs");
  tabs.innerHTML = "";
  if (!tables.some(t => t.name === currentTable)) {
    currentTable = "default";
    syncModulePath();
  }
  for (const t of tables) {
    const btn = document.createElement("button");
    btn.className = "table-tab" + (t.name === currentTable ? " table-tab--active" : "");
    btn.dataset.name = t.name;
    btn.type = "button";
    btn.innerHTML = `${esc(t.display_name)}${t.name !== "default" ? `<span class="table-tab__del" data-del="${esc(t.name)}" title="Удалить таблицу">×</span>` : ""}`;
    btn.addEventListener("click", e => {
      if (e.target.dataset.del) { delTable(e.target.dataset.del); return; }
      setCurrentTable(t.name);
      loadTables();
      loadRecords();
    });
    tabs.appendChild(btn);
  }
}

async function delTable(name) {
  if (!confirm(`Удалить таблицу «${name}»? Все данные будут потеряны.`)) return;
  await fetch(API + `/tables/${name}`, { method: "DELETE" });
  setCurrentTable("default");
  loadTables();
  loadRecords();
}

// ── Records ───────────────────────────────────────────────────────────────────

async function loadRecords() {
  const url = `${API}/tables/${currentTable}/records?limit=${LIMIT}&offset=${offset}&q=${encodeURIComponent(query)}`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.error) { $("tableBody").innerHTML = `<tr><td colspan="5" style="color:var(--bad)">${esc(data.error)}</td></tr>`; return; }
  total = data.total;

  const tbody = $("tableBody");
  if (!data.items.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="color:var(--text-subtle);text-align:center;padding:20px">Нет записей</td></tr>';
  } else {
    tbody.innerHTML = data.items.map(r => {
      const cf = r.custom_fields || {};
      // показываем основные поля если есть
      const main = ["name","имя","phone","телефон","email","source","источник"]
        .filter(k => cf[k])
        .slice(0, 4)
        .map(k => `<span class="cf-badge">${esc(k)}: ${esc(String(cf[k]).slice(0,30))}</span>`)
        .join("");
      const extra = Object.keys(cf).length - 4;
      return `<tr>
        <td style="color:var(--text-subtle)">${r.id}</td>
        <td>${esc(r.platform_id) || '<span style="color:var(--text-subtle)">—</span>'}</td>
        <td>${main || '<span style="color:var(--text-subtle);font-size:.78rem">пусто</span>'}${extra > 0 ? `<span style="color:var(--text-subtle);font-size:.72rem"> +${extra}</span>` : ""}</td>
        <td style="color:var(--text-subtle)">${(r.created_at||"").slice(0,10)}</td>
        <td style="display:flex;gap:3px">
          <button class="btn btn--xs" onclick="editRecord(${r.id})">✎</button>
          <button class="btn btn--xs btn--danger" onclick="delRecord(${r.id})">×</button>
        </td>
      </tr>`;
    }).join("");
  }

  $("pageInfo").textContent = `${offset+1}–${Math.min(offset+LIMIT,total)}`;
  $("totalInfo").textContent = `Всего: ${total}`;
  $("prevBtn").disabled = offset === 0;
  $("nextBtn").disabled = offset + LIMIT >= total;

  const stats = await fetch(API + `/tables/${currentTable}/stats`).then(r => r.json()).catch(() => ({}));
  $("statsLine").textContent = stats.total !== undefined ? `Всего: ${stats.total} · Сегодня: ${stats.today}` : "";
}

$("prevBtn").addEventListener("click", () => { offset = Math.max(0, offset - LIMIT); loadRecords(); });
$("nextBtn").addEventListener("click", () => { offset += LIMIT; loadRecords(); });
$("searchBtn").addEventListener("click", () => { query = $("searchInput").value.trim(); offset = 0; loadRecords(); });
$("searchInput").addEventListener("keydown", e => { if (e.key === "Enter") { query = $("searchInput").value.trim(); offset = 0; loadRecords(); } });
$("refreshBtn").addEventListener("click", () => { loadTables(); loadRecords(); });

// ── Record dialog ─────────────────────────────────────────────────────────────

$("addRecordBtn").addEventListener("click", () => openRecDialog());
$("recClose").addEventListener("click", () => { $("recDialog").hidden = true; });
$("recDialog").addEventListener("click", e => { if (e.target === $("recDialog")) $("recDialog").hidden = true; });

function openRecDialog(rec = null) {
  $("recId").value = rec?.id ?? "";
  $("recTitle").textContent = rec ? `Запись #${rec.id}` : "Новая запись";
  $("recPlatformId").value = rec?.platform_id ?? "";
  buildCfEditor(rec?.custom_fields ?? {});
  $("recStatus").textContent = "";
  $("recDialog").hidden = false;
  $("recPlatformId").focus();
}

function buildCfEditor(cf) {
  const container = $("cfEditor");
  container.innerHTML = "";
  const entries = Object.entries(cf);
  if (!entries.length) entries.push(["", ""]);
  for (const [k, v] of entries) addCfRow(k, String(v));
}

function addCfRow(k = "", v = "") {
  const row = document.createElement("div");
  row.className = "cf-row";
  row.innerHTML = `
    <input class="form-input cf-key" placeholder="ключ" value="${esc(k)}" />
    <input class="form-input cf-val" placeholder="значение" value="${esc(v)}" />
    <button class="btn btn--xs btn--danger" type="button" onclick="this.parentElement.remove()">×</button>`;
  $("cfEditor").appendChild(row);
}

$("cfAddRow").addEventListener("click", () => addCfRow());

$("recSave").addEventListener("click", async () => {
  const id = $("recId").value;
  const platform_id = $("recPlatformId").value.trim();
  const cf = {};
  for (const row of $("cfEditor").querySelectorAll(".cf-row")) {
    const k = row.querySelector(".cf-key").value.trim();
    const v = row.querySelector(".cf-val").value.trim();
    if (k) cf[k] = v;
  }
  const body = { platform_id, custom_fields: cf };
  const url = id ? `${API}/tables/${currentTable}/records/${id}` : `${API}/tables/${currentTable}/records`;
  const method = id ? "PUT" : "POST";
  const res = await fetch(url, { method, headers: {"Content-Type":"application/json"}, body: JSON.stringify(body) });
  if (!res.ok) { const e = await res.json().catch(() => ({})); $("recStatus").textContent = e.detail || e.error || "Ошибка"; $("recStatus").className = "status-line status-line--err"; return; }
  $("recDialog").hidden = true;
  loadRecords();
});

async function editRecord(id) {
  const res = await fetch(`${API}/tables/${currentTable}/records/${id}`);
  if (!res.ok) return;
  openRecDialog(await res.json());
}

async function delRecord(id) {
  if (!confirm("Удалить запись?")) return;
  await fetch(`${API}/tables/${currentTable}/records/${id}`, { method: "DELETE" });
  loadRecords();
}

// ── New table dialog ──────────────────────────────────────────────────────────

$("newTableBtn").addEventListener("click", () => { $("tblName").value=""; $("tblDisplay").value=""; $("tblDesc").value=""; $("tblStatus").textContent=""; $("tblDialog").hidden=false; $("tblName").focus(); });
$("tblClose").addEventListener("click", () => { $("tblDialog").hidden=true; });
$("tblDialog").addEventListener("click", e => { if (e.target===$("tblDialog")) $("tblDialog").hidden=true; });

$("tblSave").addEventListener("click", async () => {
  const name = $("tblName").value.trim();
  const display_name = $("tblDisplay").value.trim() || name;
  if (!name) { $("tblStatus").textContent = "Введите имя"; return; }
  const res = await fetch(API + "/tables", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ name, display_name, description: $("tblDesc").value.trim() })
  });
  const data = await res.json();
  if (!res.ok) { $("tblStatus").textContent = data.error || data.detail || "Ошибка"; $("tblStatus").className="status-line status-line--err"; return; }
  $("tblDialog").hidden = true;
  setCurrentTable(name);
  loadTables();
  loadRecords();
});

// ── Utils ─────────────────────────────────────────────────────────────────────

function esc(s) { return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

window.addEventListener("hashchange", () => {
  const table = tableFromHash();
  if (table === currentTable) return;
  setCurrentTable(table, false);
  loadTables();
  loadRecords();
});

// init
currentTable = tableFromHash();
loadTables().then(loadRecords);
</script>
</body>
</html>
