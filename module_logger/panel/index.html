<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Логгер</title>
  <style>
    :root {
      --bg:#060606;--panel:#101010;--panel-strong:#171717;--panel-soft:#1d1d1d;
      --text:#f2f2f2;--text-muted:#bababa;--text-subtle:#848484;
      --border:#2d2d2d;--border-mid:#3a3a3a;--border-strong:#545454;
      --accent-bg:#f4f4f4;--accent-text:#080808;
      --ok:#9fe0aa;--bad:#ffc2ca;--warn:#ffe08a;
      --term-bg:#020202;--term-text:#d4d4d4;
      --term-err:#f47067;--term-warn:#e5c07b;--term-info:#61afef;--term-dim:#5c6370;
      font-family:"IBM Plex Sans","Segoe UI",system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;}[hidden]{display:none!important;}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-size:13px;}
    button,input,select{font:inherit;}
    *{scrollbar-color:var(--border-strong) #080808;scrollbar-width:thin;}
    ::-webkit-scrollbar{width:8px;height:8px;}
    ::-webkit-scrollbar-track{background:#080808;}
    ::-webkit-scrollbar-thumb{background:var(--border-strong);border:2px solid #080808;}

    .shell{height:100vh;display:grid;grid-template-rows:auto minmax(0,1fr);}

    /* ── Tab bar ── */
    .tabbar{display:flex;align-items:stretch;border-bottom:1px solid var(--border);
      background:var(--panel);overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
    .tabbar::-webkit-scrollbar{display:none;}
    .tab{display:flex;align-items:center;gap:7px;padding:0 14px;height:38px;
      border-right:1px solid var(--border);border-bottom:2px solid transparent;
      background:transparent;color:var(--text-subtle);cursor:pointer;
      white-space:nowrap;flex-shrink:0;font-size:.82rem;}
    .tab:hover{color:var(--text-muted);background:var(--panel-strong);}
    .tab--active{color:var(--text);border-bottom-color:var(--accent-bg);background:var(--panel-soft);}
    .tab__dot{width:6px;height:6px;border-radius:50%;background:var(--border-strong);flex-shrink:0;}
    .tab__dot--ok{background:var(--ok);}
    .tab__size{color:var(--text-subtle);font-size:.72rem;}
    .tab__errs{background:var(--bad);color:#1a0305;border-radius:2px;font-size:.68rem;
      padding:1px 5px;font-weight:700;min-width:16px;text-align:center;}

    .tabbar__actions{margin-left:auto;display:flex;align-items:center;gap:6px;
      padding:0 10px;flex-shrink:0;border-left:1px solid var(--border);
      position:sticky;right:0;z-index:3;background:var(--panel);}
    .search{width:min(220px,22vw);min-width:150px;min-height:26px;border:1px solid var(--border-strong);background:#090909;color:var(--text);padding:3px 8px;font-size:.78rem;}
    .search::placeholder{color:var(--text-subtle);}

    /* ── Terminal ── */
    .term-area{display:grid;grid-template-rows:minmax(0,1fr);min-height:0;position:relative;}
    .terminal{font-family:"IBM Plex Mono","Fira Code",monospace;font-size:.78rem;
      line-height:1.55;background:var(--term-bg);color:var(--term-text);
      padding:10px 14px;overflow-y:auto;white-space:pre-wrap;word-break:break-all;}

    .l-err{color:var(--term-err);}
    .l-warn{color:var(--term-warn);}
    .l-info{color:var(--term-info);}
    .l-dim{color:var(--term-dim);}
    mark{background:#4d4213;color:#fff1a8;padding:0 1px;}

    .live-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);
      display:inline-block;animation:pulse 1.4s ease-in-out infinite;}
    .live-dot--off{background:var(--border-strong);animation:none;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;
      min-height:26px;padding:3px 10px;border:1px solid var(--border-strong);
      background:var(--panel-strong);color:var(--text);cursor:pointer;
      white-space:nowrap;font-size:.78rem;}
    .btn:disabled{opacity:.35;cursor:default;}
    .btn--primary{background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent-bg);}
    .btn--danger{background:#251315;border-color:#5f3137;color:var(--bad);}
    .btn--ghost{background:transparent;border-color:var(--border);color:var(--text-muted);}
    .btn--err{background:#251315;border-color:#5f3137;color:var(--bad);}
    .btn--err.active{background:#5f3137;color:#fff;}

    .status-bar{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;
      gap:10px;padding:3px 12px;background:rgba(2,2,2,.88);border-top:1px solid var(--border);
      font-size:.72rem;color:var(--text-subtle);}
  </style>
</head>
<body>
<div class="shell">

  <div class="tabbar" id="tabbar">
    <div class="tabbar__actions">
      <span class="live-dot live-dot--off" id="liveDot"></span>
      <input id="searchInput" class="search" placeholder="Поиск в этой вкладке" autocomplete="new-password" spellcheck="false" />
      <button id="liveBtn"     class="btn"         type="button">Live</button>
      <button id="errBtn"      class="btn btn--err" type="button">Ошибки</button>
      <button id="downloadBtn" class="btn btn--ghost" type="button" title="Скачать">↓</button>
      <button id="clearBtn"    class="btn btn--danger" type="button">Очистить</button>
      <button id="scrollBtn"   class="btn btn--ghost" type="button">↓↓</button>
    </div>
  </div>

  <div class="term-area">
    <div class="terminal" id="terminal">[Выберите вкладку]</div>
    <div class="status-bar">
      <span id="statusLines">0 строк</span>
      <span id="statusErrMode" style="color:var(--bad);display:none">● режим ошибок</span>
      <span id="statusSearch" style="display:none"></span>
      <span style="margin-left:auto;color:var(--text-subtle)" id="statusModule"></span>
    </div>
  </div>
</div>

<script>
const parts = location.pathname.split('/');
const panelIdx = parts.indexOf('panel');
const modBase = panelIdx > 0 ? parts.slice(0, panelIdx).join('/') : '';
const API = modBase + '/api';
const WS_BASE = location.origin.replace(/^http/, 'ws') + modBase + '/api';

const SAFE_MODULE_ID = /^[a-zA-Z0-9_-]+$/;

function tabFromHash() {
  const raw = decodeURIComponent((location.hash || "").replace(/^#\/?/, "")).trim();
  return SAFE_MODULE_ID.test(raw) ? raw : "";
}

function syncModulePath() {
  const path = activeTab && activeTab !== "nexus" ? activeTab : "";
  window.parent?.postMessage({type:"nexus:set-module-path", moduleId:"logger", path}, location.origin);
}

let activeTab = tabFromHash() || null;
let logsLoadedFor = null;
let ws = null;
let live = false;
let autoLive = true;
let liveReplayUntil = 0;
let errMode = false;
let lineCount = 0;
let allLines = [];      // полный буфер для фильтрации
let searchQuery = '';

const term   = document.getElementById('terminal');
const tabbar = document.getElementById('tabbar');
const liveDot = document.getElementById('liveDot');
const errBtn  = document.getElementById('errBtn');
const searchInput = document.getElementById('searchInput');

// ── Modules & tabs ────────────────────────────────────────────────────────────

async function loadModules() {
  const res = await fetch(API + '/modules').catch(() => null);
  if (!res?.ok) return;
  const mods = await res.json();
  const selectedExists = activeTab && mods.some(m => m.id === activeTab);
  if (!selectedExists) {
    activeTab = mods.some(m => m.id === 'nexus') ? 'nexus' : (mods[0]?.id || null);
    logsLoadedFor = null;
  }
  const actions = document.querySelector('.tabbar__actions');
  tabbar.innerHTML = '';
  tabbar.appendChild(actions);

  for (const m of mods) {
    // считаем ошибки из лога (простая эвристика по размеру — при live будем считать)
    const tab = document.createElement('button');
    tab.className = 'tab' + (m.id === activeTab ? ' tab--active' : '');
    tab.dataset.id = m.id;
    tab.type = 'button';
    tab.innerHTML = `
      <span class="tab__dot ${m.has_logs && m.size > 0 ? 'tab__dot--ok' : ''}"></span>
      <span>${esc(m.name || m.id)}</span>
      ${m.size > 0 ? `<span class="tab__size">${fmtSize(m.size)}</span>` : ''}`;
    tab.addEventListener('click', () => selectTab(m.id));
    tabbar.insertBefore(tab, actions);
  }

  if (activeTab && logsLoadedFor !== activeTab) await selectTab(activeTab, false);
}

async function selectTab(id, syncPath = true) {
  stopLive();
  errMode = false;
  errBtn.classList.remove('active');
  document.getElementById('statusErrMode').style.display = 'none';
  activeTab = id;
  if (syncPath) syncModulePath();
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('tab--active', t.dataset.id === id));
  document.getElementById('statusModule').textContent = id;
  document.getElementById('clearBtn').disabled = id === 'nexus';
  await loadLogs();
  logsLoadedFor = id;
  if (autoLive) startLive();
}

async function loadLogs() {
  if (!activeTab) return;
  term.textContent = 'Загрузка…';
  const res = await fetch(`${API}/logs/${activeTab}?lines=500`).catch(() => null);
  if (!res?.ok) { term.textContent = '[ошибка загрузки]'; return; }
  const text = await res.text();
  allLines = text.split('\n');
  applyFilters();
  scrollBottom();
}

function renderLines(lines) {
  lineCount = lines.filter(l => l.trim()).length;
  term.innerHTML = lines.map(line => colorize(line, searchQuery)).join('\n');
  document.getElementById('statusLines').textContent = `${lineCount} строк`;
  const searchStatus = document.getElementById('statusSearch');
  searchStatus.style.display = searchQuery ? 'inline' : 'none';
  searchStatus.textContent = searchQuery ? `поиск: ${lineCount}` : '';
}

function filteredLines() {
  let lines = errMode ? allLines.filter(isError) : allLines;
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    lines = lines.filter(line => line.toLowerCase().includes(q));
  }
  return lines;
}

function applyFilters() {
  renderLines(filteredLines());
}

function isError(line) {
  return /\b(error|exception|traceback|critical|fatal|warn(ing)?)\b/i.test(line);
}

function appendLine(line) {
  if (!line.trim()) return;
  if (Date.now() < liveReplayUntil && allLines.slice(-120).includes(line)) return;
  allLines.push(line);
  if (allLines.length > 5000) allLines.shift();
  if (errMode && !isError(line)) return;
  if (searchQuery && !line.toLowerCase().includes(searchQuery.toLowerCase())) return;
  lineCount++;
  const span = document.createElement('span');
  span.innerHTML = colorize(line, searchQuery) + '\n';
  term.appendChild(span);
  document.getElementById('statusLines').textContent = `${lineCount} строк`;
  if (term.scrollTop + term.clientHeight >= term.scrollHeight - 80) scrollBottom();
  while (term.childNodes.length > 3000) term.removeChild(term.firstChild);
}

function highlight(text, query) {
  if (!query) return text;
  const safe = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(safe, 'ig'), m => `<mark>${m}</mark>`);
}

function colorize(line, query='') {
  const l = line.toLowerCase();
  const e = highlight(esc(line), esc(query));
  if (/\b(error|exception|traceback|critical|fatal)\b/.test(l)) return `<span class="l-err">${e}</span>`;
  if (/\bwarn(ing)?\b/.test(l))   return `<span class="l-warn">${e}</span>`;
  if (/\b(info|started|active|ok|success)\b/.test(l)) return `<span class="l-info">${e}</span>`;
  if (/\bdebug\b/.test(l))        return `<span class="l-dim">${e}</span>`;
  return e;
}

// ── Error mode ────────────────────────────────────────────────────────────────

errBtn.addEventListener('click', () => {
  errMode = !errMode;
  errBtn.classList.toggle('active', errMode);
  document.getElementById('statusErrMode').style.display = errMode ? 'inline' : 'none';
  applyFilters();
  scrollBottom();
});

searchInput.addEventListener('input', () => {
  searchQuery = searchInput.value.trim();
  applyFilters();
});

// ── Live WebSocket ────────────────────────────────────────────────────────────

function startLive() {
  if (ws) { ws.close(); ws = null; }
  if (!activeTab) return;
  liveReplayUntil = Date.now() + 1500;
  ws = new WebSocket(`${WS_BASE}/ws/${activeTab}`);
  ws.onmessage = e => { if (e.data) appendLine(e.data.replace(/\n$/, '')); };
  ws.onopen = () => {
    live = true; liveDot.classList.remove('live-dot--off');
    document.getElementById('liveBtn').textContent = 'Stop';
  };
  ws.onclose = ws.onerror = () => stopLive();
}

function stopLive() {
  if (ws) { try { ws.close(); } catch(e){} ws = null; }
  live = false;
  liveDot.classList.add('live-dot--off');
  document.getElementById('liveBtn').textContent = 'Live';
}

document.getElementById('liveBtn').addEventListener('click', () => {
  autoLive = !live;
  live ? stopLive() : startLive();
});

// ── Actions ───────────────────────────────────────────────────────────────────

document.getElementById('downloadBtn').addEventListener('click', () => {
  if (!activeTab) return;
  Object.assign(document.createElement('a'), {
    href: `${API}/logs/${activeTab}/download`, download: `${activeTab}.log`
  }).click();
});

document.getElementById('clearBtn').addEventListener('click', async () => {
  if (!activeTab || activeTab === 'nexus') return;
  if (!confirm(`Очистить логи «${activeTab}»?`)) return;
  await fetch(`${API}/logs/${activeTab}`, {method:'DELETE'});
  allLines = [];
  await loadLogs();
  loadModules();
});

function scrollBottom() { term.scrollTop = term.scrollHeight; }
document.getElementById('scrollBtn').addEventListener('click', scrollBottom);

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtSize(b) {
  if (b<1024) return b+'B'; if (b<1048576) return (b/1024).toFixed(1)+'K';
  return (b/1048576).toFixed(1)+'M';
}

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('hashchange', () => {
  const next = tabFromHash();
  if (next && next !== activeTab) selectTab(next, false);
});
loadModules();
setInterval(loadModules, 15000);
</script>
</body>
</html>
