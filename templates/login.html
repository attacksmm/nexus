<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nexus — Вход</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23060606'/%3E%3Ccircle cx='16' cy='16' r='7' fill='none' stroke='%23f2f2f2' stroke-width='2.5'/%3E%3Ccircle cx='16' cy='16' r='2' fill='%23f2f2f2'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="login-body">
  <div class="login-shell">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand__mark"></div>
        <div>
          <strong>Nexus</strong>
          <span>Orchestrator</span>
        </div>
      </div>
      <form method="post" action="/login" class="login-form">
        <label>
          <span>Логин</span>
          <input name="username" type="text" autocomplete="username" required autofocus placeholder="admin" />
        </label>
        <label>
          <span>Пароль</span>
          <input name="password" type="password" autocomplete="current-password" required placeholder="••••••••" />
        </label>
        {% if error %}
        <p class="login-error">{{ error }}</p>
        {% endif %}
        <button type="submit" class="btn btn--primary">Войти</button>
      </form>
    </div>
  </div>
</body>
</html>
