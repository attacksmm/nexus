<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SBKVD GPT — доступы</title>
  <style>
    :root{color-scheme:dark;--bg:#060606;--panel:#101010;--panel-strong:#171717;--panel-soft:#1d1d1d;--text:#f2f2f2;--muted:#9a9a9a;--subtle:#777;--border:#2d2d2d;--border-strong:#4a4a4a;--accent:#d8d1c3;--accent-text:#080808;--bad:#d9735a;--ok:#8fe5a7;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    *{box-sizing:border-box;scrollbar-width:thin;scrollbar-color:#4c4c4c #101010}
    *::-webkit-scrollbar{width:10px;height:10px}*::-webkit-scrollbar-track{background:#101010}*::-webkit-scrollbar-thumb{background:#4c4c4c;border:2px solid #101010}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font:13px/1.45 var(--font)}
    button,input,select{font:inherit}button{cursor:pointer}button:disabled{opacity:.45;cursor:default}
    [hidden]{display:none!important}
    .shell{height:100vh;display:grid;grid-template-rows:auto auto minmax(0,1fr) auto;background:var(--bg)}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px;border-bottom:1px solid var(--border);background:var(--panel)}
    .title{display:flex;align-items:center;gap:10px;min-width:0}.title strong{font-size:15px}.badge{display:inline-flex;align-items:center;min-height:22px;padding:2px 8px;border:1px solid #265733;background:#07160b;color:var(--ok);font-size:12px}
    .actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.btn{min-height:30px;padding:5px 10px;border:1px solid var(--border-strong);background:var(--panel-strong);color:var(--text);text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap}.btn:hover{background:var(--panel-soft)}.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-text)}.btn.ghost{background:transparent;border-color:var(--border);color:var(--muted)}.btn.danger{background:#241413;border-color:#5f3137;color:var(--bad)}
    .tabs{display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid var(--border);background:#090909;overflow-x:auto}.tab{min-height:30px;padding:5px 12px;border:1px solid var(--border);background:transparent;color:var(--muted)}.tab.active{background:var(--panel-strong);border-color:var(--border-strong);color:var(--text)}
    .view{min-height:0;overflow:hidden;display:none}.view.active{display:grid;grid-template-columns:320px minmax(0,1fr)}#view-aliases.active{display:block;overflow:auto}
    .side{min-height:0;overflow:auto;border-right:1px solid var(--border);background:#0b0b0b}.main{min-height:0;overflow:auto;padding:12px;display:grid;gap:12px;align-content:start}
    .row{display:grid;gap:4px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer}.row:hover,.row.active{background:var(--panel-strong)}.row strong{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.row .meta{color:var(--subtle);font-size:12px}
    .toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.field{display:grid;gap:5px;min-width:0}.label{font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
    input,select{width:100%;min-height:34px;border:1px solid var(--border-strong);background:#0a0a0a;color:var(--text);padding:7px 9px;outline:none}.toggle{min-height:34px;border:1px solid var(--border);background:var(--panel-strong);display:inline-flex;align-items:center;gap:9px;padding:6px 10px;user-select:none}.toggle input{width:auto;min-height:auto}
    .section{border:1px solid var(--border);background:var(--panel);padding:10px;display:grid;gap:8px}.section-title{font-weight:700}.check-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:6px}.check{display:flex;align-items:center;gap:8px;border:1px solid var(--border);background:#0c0c0c;padding:8px;min-width:0}.check input{width:auto;min-height:auto}.check span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .alias-view{min-height:0;overflow:auto;padding:10px}.alias-row{display:grid;grid-template-columns:minmax(220px,1.2fr) minmax(160px,.8fr) minmax(160px,.8fr) auto;gap:8px;align-items:center;border-bottom:1px solid var(--border);padding:8px 0}.path{color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.statusbar{height:30px;display:flex;align-items:center;gap:12px;padding:0 10px;border-top:1px solid var(--border);background:var(--panel);color:var(--muted);font-size:12px}.error{color:var(--bad)}.empty{margin:24px;color:var(--muted)}
    @media(max-width:820px){.view.active{grid-template-columns:1fr;grid-template-rows:180px minmax(0,1fr)}.side{border-right:0;border-bottom:1px solid var(--border)}.grid,.alias-row{grid-template-columns:1fr}.topbar{align-items:stretch;flex-direction:column}.actions{justify-content:flex-start}}
  </style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="title">
      <strong>SBKVD GPT</strong>
      <span class="badge">доступы</span>
      <span id="adminState" class="muted">проверка прав</span>
    </div>
    <div class="actions">
      <a class="btn primary" id="chatLink" href="chat/" target="_blank" rel="noreferrer">Открыть чат</a>
      <button class="btn ghost" id="reloadBtn" type="button">Обновить</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-view="accounts" type="button">Люди и доступы</button>
    <button class="tab" data-view="aliases" type="button">Названия промптов</button>
  </nav>

  <section id="view-accounts" class="view active">
    <aside class="side" id="accountList"></aside>
    <main class="main">
      <div class="toolbar">
        <div>
          <div class="section-title">Настройки человека</div>
          <div class="meta">Выберите аккаунт слева или создайте новый.</div>
        </div>
        <div class="actions">
          <button class="btn" id="newAccountBtn" type="button">Новый человек</button>
          <button class="btn danger" id="deleteAccountBtn" type="button">Удалить</button>
          <button class="btn primary" id="saveAccountBtn" type="button">Сохранить</button>
        </div>
      </div>
      <div class="grid">
        <div class="field"><label class="label">Логин для входа в чат</label><input id="loginInput" autocomplete="off"></div>
        <div class="field"><label class="label">Имя в интерфейсе</label><input id="displayInput" autocomplete="off"></div>
        <div class="field"><label class="label">Промпт по умолчанию</label><select id="defaultPrompt"></select></div>
        <div class="field"><label class="label">Модель по умолчанию</label><select id="defaultModel"></select></div>
        <label class="toggle"><input id="activeInput" type="checkbox" checked> Аккаунт активен</label>
      </div>
      <div class="section">
        <div class="toolbar"><div class="section-title">Доступные промпты</div><div class="actions"><button class="btn ghost" id="allPromptsBtn" type="button">Все</button><button class="btn ghost" id="noPromptsBtn" type="button">Ни одного</button></div></div>
        <div class="check-grid" id="promptChecks"></div>
      </div>
      <div class="section">
        <div class="toolbar"><div class="section-title">Модели в сервисе для этого человека</div><div class="actions"><button class="btn ghost" id="allModelsBtn" type="button">Все</button><button class="btn ghost" id="noModelsBtn" type="button">Ни одной</button></div></div>
        <div class="check-grid" id="modelChecks"></div>
      </div>
    </main>
  </section>

  <section id="view-aliases" class="view">
    <main class="alias-view" id="aliasList"></main>
  </section>

  <footer class="statusbar"><span id="statusText">Готово</span></footer>
</div>

<script>
const API = new URL('../api', location.href).pathname.replace(/\/$/, '');
const $ = id => document.getElementById(id);
const state = {accounts:[], prompts:[], models:[], selected:null, access:null, admin:false};

function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function setStatus(text, bad=false){$('statusText').textContent=text;$('statusText').classList.toggle('error',bad)}
async function api(path, options={}){
  const res = await fetch(API+path,{credentials:'same-origin',...options});
  const raw = await res.text();
  let data={}; try{data=raw?JSON.parse(raw):{}}catch{data={detail:raw||`HTTP ${res.status}`}}
  if(!res.ok) throw new Error(data.detail||data.error||`HTTP ${res.status}`);
  return data;
}
const json = (method, body)=>({method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});

function optionList(select, items, value, label, selected){
  select.innerHTML = '<option value="">Не задано</option>';
  for(const item of items){
    const opt=document.createElement('option');
    opt.value=item[value]; opt.textContent=item[label]||item[value];
    if(opt.value===selected) opt.selected=true;
    select.append(opt);
  }
}
function checkbox(name, value, label, checked){
  const node=document.createElement('label');
  node.className='check';
  node.innerHTML=`<input type="checkbox" name="${name}" value="${esc(value)}"${checked?' checked':''}><span title="${esc(label)}">${esc(label)}</span>`;
  return node;
}
function checkedValues(name){return [...document.querySelectorAll(`input[name="${name}"]:checked`)].map(x=>x.value)}

async function loadAll(){
  setStatus('Загрузка...');
  const me = await api('/admin/me');
  state.admin = true;
  $('adminState').textContent = `Nexus admin: ${me.username}`;
  const [accounts,prompts,models] = await Promise.all([
    api('/admin/accounts'),
    api('/admin/prompts'),
    api('/admin/models'),
  ]);
  state.accounts = accounts.items||[];
  state.prompts = prompts.items||[];
  state.models = models.items||[];
  state.selected = state.selected || state.accounts[0]?.id || null;
  renderAccounts();
  renderAliases();
  if(state.selected) await loadAccess(state.selected);
  else newAccount();
  setStatus('Готово');
}

function renderAccounts(){
  const list=$('accountList');
  list.innerHTML='';
  if(!state.accounts.length){list.innerHTML='<div class="empty">Аккаунтов пока нет</div>';return}
  for(const account of state.accounts){
    const row=document.createElement('div');
    row.className='row'+(account.id===state.selected?' active':'');
    row.innerHTML=`<strong>${esc(account.login)}</strong><span class="meta">${account.active?'активен':'выключен'} · промптов ${account.prompt_count} · моделей ${account.model_count}</span>`;
    row.onclick=()=>loadAccess(account.id).catch(e=>setStatus(e.message,true));
    list.append(row);
  }
}

async function loadAccess(id){
  state.selected=id;
  renderAccounts();
  const data=await api('/admin/accounts/'+id+'/access');
  state.access=data;
  const a=data.account;
  $('loginInput').value=a.login||'';
  $('displayInput').value=a.display_name||'';
  $('activeInput').checked=!!a.active;
  optionList($('defaultPrompt'), state.prompts.map(p=>({id:p.path,name:p.label||p.path})), 'id', 'name', a.default_prompt);
  optionList($('defaultModel'), state.models, 'id', 'name', a.default_model);
  renderChecks(data.prompt_paths||[], data.models||[]);
}

function renderChecks(promptPaths=[], models=[]){
  $('promptChecks').innerHTML='';
  for(const p of state.prompts) $('promptChecks').append(checkbox('prompt', p.path, p.label||p.path, promptPaths.includes(p.path)));
  $('modelChecks').innerHTML='';
  for(const m of state.models) $('modelChecks').append(checkbox('model', m.id, m.name||m.id, models.includes(m.id)));
}

function newAccount(){
  state.selected=null;
  renderAccounts();
  $('loginInput').value='';
  $('displayInput').value='';
  $('activeInput').checked=true;
  optionList($('defaultPrompt'), state.prompts.map(p=>({id:p.path,name:p.label||p.path})), 'id', 'name', state.prompts[0]?.path||'');
  optionList($('defaultModel'), state.models, 'id', 'name', 'openai/gpt-4.1-mini');
  renderChecks(state.prompts.map(p=>p.path), state.models.filter(m=>['openai/gpt-4.1-mini','openai/gpt-4.1'].includes(m.id)).map(m=>m.id));
  setStatus('Новый аккаунт');
}

async function saveAccount(){
  const body = {
    login: $('loginInput').value.trim(),
    display_name: $('displayInput').value.trim(),
    active: $('activeInput').checked,
    default_prompt: $('defaultPrompt').value,
    default_model: $('defaultModel').value,
  };
  if(!body.login) throw new Error('Логин обязателен');
  let id=state.selected;
  if(id) await api('/admin/accounts/'+id, json('PUT', body));
  else {
    const created = await api('/admin/accounts', json('POST', body));
    id = created.id;
    state.selected = id;
  }
  await api('/admin/accounts/'+id+'/access', json('PUT', {
    prompt_paths: checkedValues('prompt'),
    models: checkedValues('model'),
    default_prompt: body.default_prompt,
    default_model: body.default_model,
    active: body.active,
  }));
  setStatus('Сохранено');
  await loadAll();
}

async function deleteAccount(){
  if(!state.selected) return;
  if(!confirm('Удалить аккаунт и всю его историю?')) return;
  await api('/admin/accounts/'+state.selected,{method:'DELETE'});
  state.selected=null;
  setStatus('Аккаунт удалён');
  await loadAll();
}

function renderAliases(){
  const list=$('aliasList');
  list.innerHTML='';
  for(const p of state.prompts){
    const row=document.createElement('div');
    row.className='alias-row';
    row.dataset.path=p.path;
    row.innerHTML=`<div class="path" title="${esc(p.path)}">${esc(p.path)}</div><input class="alias-title" value="${esc(p.title||'')}" placeholder="Название"><input class="alias-folder" value="${esc(p.folder||'')}" placeholder="Группа"><button class="btn" type="button">Сохранить</button>`;
    row.querySelector('button').onclick=()=>saveAlias(row).catch(e=>setStatus(e.message,true));
    list.append(row);
  }
}
async function saveAlias(row){
  await api('/admin/prompt-aliases', json('PUT', {
    prompt_path: row.dataset.path,
    title: row.querySelector('.alias-title').value,
    folder: row.querySelector('.alias-folder').value,
  }));
  setStatus('Название промпта сохранено');
}

document.querySelectorAll('.tab').forEach(tab=>tab.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active', x===tab));
  document.querySelectorAll('.view').forEach(x=>x.classList.toggle('active', x.id === 'view-'+tab.dataset.view));
});
$('reloadBtn').onclick=()=>loadAll().catch(e=>setStatus(e.message,true));
$('newAccountBtn').onclick=newAccount;
$('saveAccountBtn').onclick=()=>saveAccount().catch(e=>setStatus(e.message,true));
$('deleteAccountBtn').onclick=()=>deleteAccount().catch(e=>setStatus(e.message,true));
$('allPromptsBtn').onclick=()=>document.querySelectorAll('input[name=prompt]').forEach(x=>x.checked=true);
$('noPromptsBtn').onclick=()=>document.querySelectorAll('input[name=prompt]').forEach(x=>x.checked=false);
$('allModelsBtn').onclick=()=>document.querySelectorAll('input[name=model]').forEach(x=>x.checked=true);
$('noModelsBtn').onclick=()=>document.querySelectorAll('input[name=model]').forEach(x=>x.checked=false);

loadAll().catch(e=>{
  $('adminState').textContent='нет доступа';
  document.querySelector('.shell').innerHTML = `<header class="topbar"><div class="title"><strong>SBKVD GPT</strong><span class="badge">доступы</span></div><a class="btn primary" href="chat/" target="_blank" rel="noreferrer">Открыть чат</a></header><main class="main"><div class="section"><div class="section-title">Нет доступа к настройкам</div><div class="meta">Управление аккаунтами, промптами и моделями доступно только Nexus admin. Чат открыт на отдельном адресе.</div><a class="btn primary" href="chat/" target="_blank" rel="noreferrer">Открыть полноэкранный чат</a><div class="error">${esc(e.message)}</div></div></main>`;
});
</script>
</body>
</html>
