<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Списки Сенлер</title>
  <style>
    :root {
      --bg:#060606;--panel:#101010;--panel-strong:#171717;--panel-soft:#1d1d1d;
      --text:#f2f2f2;--text-muted:#bababa;--text-subtle:#848484;
      --border:#2d2d2d;--border-mid:#3a3a3a;--border-strong:#545454;
      --accent-bg:#f4f4f4;--accent-text:#080808;
      --ok:#9fe0aa;--ok-bg:#102417;--ok-bd:#315f3a;
      --bad:#ffc2ca;--bad-bg:#251315;--bad-bd:#5f3137;
      --warn:#ffe08a;--warn-bg:#1a1500;--warn-bd:#6b5a00;
      font-family:"IBM Plex Sans","Segoe UI",system-ui,sans-serif;font-size:13px;
    }
    *,*::before,*::after{box-sizing:border-box;}[hidden]{display:none!important;}
    html,body{margin:0;height:100%;background:var(--bg);color:var(--text);}
    button,input,select,textarea{font:inherit;}
    *{scrollbar-color:var(--border-strong) #080808;scrollbar-width:thin;}
    ::-webkit-scrollbar{width:8px;height:8px;}
    ::-webkit-scrollbar-track{background:#080808;}
    ::-webkit-scrollbar-thumb{background:var(--border-strong);border:2px solid #080808;}

    .shell{height:100vh;display:grid;grid-template-rows:auto minmax(0,1fr);position:relative;}

    .tabs{display:flex;align-items:stretch;border-bottom:1px solid var(--border);background:var(--panel);flex-shrink:0;}
    .tab{padding:0 16px;height:36px;border:none;border-bottom:2px solid transparent;
      background:transparent;color:var(--text-subtle);cursor:pointer;font-size:.82rem;}
    .tab:hover{color:var(--text-muted);}
    .tab--active{color:var(--text);border-bottom-color:var(--accent-bg);}
    .tabs__right{margin-left:auto;display:flex;align-items:center;padding:0 10px;gap:8px;border-left:1px solid var(--border);}

    .view{display:none;flex-direction:column;min-height:0;overflow:hidden;height:100%;}
    .view--active{display:flex;}

    .table-wrap{overflow:auto;flex:1;}
    table{width:100%;border-collapse:collapse;font-size:.82rem;}
    th,td{padding:7px 10px;border-bottom:1px solid var(--border);text-align:left;vertical-align:middle;}
    th{color:var(--text-subtle);font-weight:500;background:var(--panel);position:sticky;top:0;z-index:1;}
    tr:hover td{background:var(--panel-strong);}
    .badge{display:inline-block;padding:1px 7px;border:1px solid;font-size:.72rem;}
    .badge--ok{color:var(--ok);border-color:var(--ok-bd);background:var(--ok-bg);}
    .badge--bad{color:var(--bad);border-color:var(--bad-bd);background:var(--bad-bg);}
    .badge--off{color:var(--text-subtle);border-color:var(--border-mid);}

    .form-panel{flex-shrink:0;padding:10px 12px;border-bottom:1px solid var(--border);
      background:var(--panel);display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}
    .f-group{display:grid;gap:4px;min-width:140px;}
    .f-group label{font-size:.72rem;color:var(--text-subtle);text-transform:uppercase;letter-spacing:.08em;}
    .f-input{min-height:30px;padding:4px 8px;border:1px solid var(--border-strong);background:#090909;color:var(--text);width:100%;}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;
      min-height:28px;padding:4px 11px;border:1px solid var(--border-strong);
      background:var(--panel-strong);color:var(--text);cursor:pointer;font-size:.8rem;white-space:nowrap;}
    .btn:disabled{opacity:.35;cursor:default;}
    .btn--primary{background:var(--accent-bg);color:var(--accent-text);border-color:var(--accent-bg);}
    .btn--danger{background:var(--bad-bg);border-color:var(--bad-bd);color:var(--bad);}
    .btn--ghost{background:transparent;border-color:var(--border);color:var(--text-muted);}
    .btn--sm{min-height:24px;padding:2px 7px;font-size:.74rem;}

    .visit-detail{
      position:absolute;bottom:0;left:0;right:0;
      background:var(--panel);border-top:1px solid var(--border-strong);
      max-height:50%;display:flex;flex-direction:column;
    }
    .visit-detail__head{
      display:flex;align-items:center;justify-content:space-between;
      padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
    }
    .visit-detail__body{overflow-y:auto;padding:12px;font-size:.8rem;display:grid;gap:8px;}
    .vd-error{color:var(--bad);padding:6px 10px;border:1px solid var(--bad-bd);background:var(--bad-bg);}
    .vd-kv{display:grid;grid-template-columns:160px 1fr;gap:4px 10px;}
    .vd-key{color:var(--text-subtle);}
    .vd-val{color:var(--text);word-break:break-all;font-family:"IBM Plex Mono",monospace;font-size:.76rem;}
    .vd-pre{margin:0;padding:10px;background:#030303;border:1px solid var(--border);
      color:var(--text-muted);font-family:"IBM Plex Mono",monospace;font-size:.74rem;
      white-space:pre-wrap;word-break:break-all;overflow-x:auto;}
    tr.visit-row{cursor:pointer;}
    tr.visit-row:hover td{background:var(--panel-soft);}
    tr.visit-row--active td{background:var(--panel-soft);border-bottom-color:var(--border-strong);}

    .script-body{padding:16px;display:grid;gap:10px;overflow-y:auto;}
    .script-note{margin:0;color:var(--text-muted);font-size:.82rem;line-height:1.6;}
    .script-box{margin:0;padding:12px;background:#030303;border:1px solid var(--border);
      color:var(--ok);font-family:"IBM Plex Mono",monospace;font-size:.74rem;
      white-space:pre;overflow-x:auto;}

    .empty{padding:24px;text-align:center;color:var(--text-subtle);}
  </style>
</head>
<body>
<div class="shell">

  <div class="tabs">
    <button class="tab tab--active" data-view="bindings" type="button">Связки</button>
    <button class="tab" data-view="pages" type="button">Страницы</button>
    <button class="tab" data-view="visits" type="button">Журнал</button>
    <button class="tab" data-view="script" type="button">Скрипт</button>
    <div class="tabs__right">
      <button id="refreshBtn" class="btn btn--ghost btn--sm" type="button">↻</button>
    </div>
  </div>

  <!-- Связки -->
  <div class="view view--active" id="viewBindings">
    <div class="form-panel">
      <div class="f-group" style="flex:2;min-width:200px">
        <label>Страница</label>
        <select id="bPageUrl" class="f-input"><option value="">— выберите страницу —</option></select>
      </div>
      <div class="f-group" style="flex:1">
        <label>ID списка Senler</label>
        <input id="bSubId" class="f-input" placeholder="123456" />
      </div>
      <div class="f-group" style="min-width:140px">
        <label>Параметр идентификатора</label>
        <input id="bParam" class="f-input" placeholder="utm_term" value="" />
      </div>
      <div class="f-group" style="flex:1">
        <label>Заметка</label>
        <input id="bNote" class="f-input" placeholder="Необязательно" />
      </div>
      <button id="bAddBtn" class="btn btn--primary" type="button">+ Добавить</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Страница</th><th>Список Senler</th><th>Параметр</th><th>Заметка</th><th>Статус</th><th></th></tr></thead>
        <tbody id="bindingsTable"></tbody>
      </table>
    </div>
  </div>

  <!-- Страницы -->
  <div class="view" id="viewPages">
    <div class="table-wrap">
      <table>
        <thead><tr><th>URL страницы</th><th>Первый визит</th><th></th></tr></thead>
        <tbody id="pagesTable"></tbody>
      </table>
    </div>
  </div>

  <!-- Журнал -->
  <div class="view" id="viewVisits">
    <div class="table-wrap">
      <table style="table-layout:fixed">
        <colgroup>
          <col style="width:120px">
          <col>
          <col style="width:90px">
          <col style="width:60px">
          <col style="width:84px">
        </colgroup>
        <thead><tr>
          <th>Время</th><th>Страница</th><th>VK ID</th><th>Связка</th>
          <th id="thResult" style="cursor:pointer;user-select:none">Результат</th>
        </tr></thead>
        <tbody id="visitsTable"></tbody>
      </table>
    </div>
  </div>

  <!-- Детали визита -->
  <div id="visitDetail" class="visit-detail" hidden>
    <div class="visit-detail__head">
      <span id="vdTitle" style="font-weight:600;font-size:.88rem"></span>
      <button id="vdClose" class="btn btn--sm btn--ghost" type="button">×</button>
    </div>
    <div class="visit-detail__body">
      <div id="vdError" class="vd-error" hidden></div>
      <div id="vdDetails"></div>
    </div>
  </div>

  <!-- Скрипт -->
  <div class="view" id="viewScript">
    <div class="script-body">
      <p class="script-note">Вставьте в <code>&lt;head&gt;</code> или перед <code>&lt;/body&gt;</code>. Первое посещение зарегистрирует страницу — потом создайте связку.</p>
      <pre class="script-box" id="scriptBox"></pre>
      <button id="copyScriptBtn" class="btn" type="button" style="justify-self:start">Скопировать</button>
    </div>
  </div>

</div>

<script>
const parts = location.pathname.split('/');
const panelIdx = parts.indexOf('panel');
const modBase = panelIdx > 0 ? parts.slice(0, panelIdx).join('/') : '';
const API = modBase + '/api';
const TRACK_URL = location.origin + modBase + '/api/track';

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('tab--active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('view--active'));
    btn.classList.add('tab--active');
    const id = 'view' + btn.dataset.view[0].toUpperCase() + btn.dataset.view.slice(1);
    document.getElementById(id).classList.add('view--active');
    if (btn.dataset.view === 'bindings') { loadBindings(); loadPages(); }
    if (btn.dataset.view === 'pages')    loadPages();
    if (btn.dataset.view === 'visits')   loadVisits();
    if (btn.dataset.view === 'script')   renderScript();
  });
});

document.getElementById('refreshBtn').addEventListener('click', () => { loadBindings(); loadPages(); loadEnvCheck(); });

async function loadEnvCheck() {
  const r = await fetch(API + '/env-status').catch(() => null);
  if (!r?.ok) return;
  const s = await r.json();
  if (!s.ready) {
    const missing = Object.entries(s).filter(([k,v]) => k !== 'ready' && !v).map(([k]) => k).join(', ');
    (window.parent?.notify || console.warn)(`Senler: не настроены переменные ${missing}`, 'warn');
  }
}

let pagesData = [];

async function loadPages() {
  const r = await fetch(API + '/pages').catch(() => null);
  if (!r?.ok) return;
  pagesData = await r.json();

  const sel = document.getElementById('bPageUrl');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— выберите страницу —</option>' +
    pagesData.map(p => `<option value="${esc(p.url)}">${esc(p.url)}</option>`).join('');
  if (cur) sel.value = cur;

  const tb = document.getElementById('pagesTable');
  if (!pagesData.length) { tb.innerHTML = '<tr><td colspan="3" class="empty">Нет страниц. Посетите сайт со скриптом.</td></tr>'; return; }
  tb.innerHTML = pagesData.map(p => `<tr>
    <td style="word-break:break-all">${esc(p.url)}</td>
    <td style="color:var(--text-subtle);white-space:nowrap">${p.first_seen?.slice(0,16).replace('T',' ')}</td>
    <td><button class="btn btn--sm btn--danger" onclick="deletePage(${p.id})">×</button></td>
  </tr>`).join('');
}

async function deletePage(id) {
  if (!confirm('Удалить страницу и все связки для неё?')) return;
  await fetch(API + `/pages/${id}`, {method:'DELETE'});
  loadPages(); loadBindings();
}

async function loadBindings() {
  const r = await fetch(API + '/bindings').catch(() => null);
  if (!r?.ok) return;
  const list = await r.json();
  const tb = document.getElementById('bindingsTable');
  if (!list.length) { tb.innerHTML = '<tr><td colspan="6" class="empty">Связок нет.</td></tr>'; return; }
  tb.innerHTML = list.map(b => `<tr>
    <td style="word-break:break-all;max-width:280px;font-size:.78rem">${esc(b.page_url)}</td>
    <td><code style="color:var(--warn)">${esc(b.subscription_id)}</code></td>
    <td style="color:var(--text-subtle)">${esc(b.vk_id_param)}</td>
    <td style="color:var(--text-subtle)">${esc(b.note)}</td>
    <td><span class="badge ${b.active ? 'badge--ok' : 'badge--off'}">${b.active ? 'активна' : 'откл'}</span></td>
    <td style="display:flex;gap:4px">
      <button class="btn btn--sm btn--ghost" onclick="toggleBinding(${b.id})">${b.active?'Откл':'Вкл'}</button>
      <button class="btn btn--sm btn--danger" onclick="deleteBinding(${b.id})">×</button>
    </td>
  </tr>`).join('');
}

document.getElementById('bAddBtn').addEventListener('click', async () => {
  const page_url = document.getElementById('bPageUrl').value;
  const subscription_id = document.getElementById('bSubId').value.trim();
  const vk_id_param = document.getElementById('bParam').value.trim() || 'vk_id';
  const note = document.getElementById('bNote').value.trim();
  if (!page_url || !subscription_id) { alert('Выберите страницу и укажите ID списка'); return; }
  const r = await fetch(API + '/bindings', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({page_url, subscription_id, vk_id_param, note})
  });
  const d = await r.json();
  if (!r.ok) { alert(d.error || 'Ошибка'); return; }
  document.getElementById('bSubId').value = '';
  document.getElementById('bNote').value = '';
  loadBindings();
});

async function toggleBinding(id) {
  await fetch(API + `/bindings/${id}/toggle`, {method:'PUT'});
  loadBindings();
}

async function deleteBinding(id) {
  if (!confirm('Удалить связку?')) return;
  await fetch(API + `/bindings/${id}`, {method:'DELETE'});
  loadBindings();
}

let _activeVisitRow = null;
const FILTERS = ['ok', 'all', 'error'];
let _visitFilter = 'ok';
let _allVisits = [];

const _thResult = document.getElementById('thResult');
_thResult.style.color = 'var(--ok)';
_thResult.addEventListener('click', () => {
  _visitFilter = FILTERS[(FILTERS.indexOf(_visitFilter) + 1) % FILTERS.length];
  _thResult.style.color = _visitFilter === 'error' ? 'var(--bad)' : _visitFilter === 'ok' ? 'var(--ok)' : '';
  renderVisits();
});

async function loadVisits() {
  const r = await fetch(API + '/visits?limit=500').catch(() => null);
  if (!r?.ok) return;
  _allVisits = await r.json();
  closeVisitDetail();
  renderVisits();
}

function renderVisits() {
  const tb = document.getElementById('visitsTable');
  const list = _visitFilter === 'all' ? _allVisits
    : _allVisits.filter(v => _visitFilter === 'ok' ? v.success : !v.success);
  if (!list.length) {
    tb.innerHTML = `<tr><td colspan="5" class="empty">${_visitFilter === 'all' ? 'Журнал пуст' : 'Нет записей'}</td></tr>`;
    return;
  }
  tb.innerHTML = list.map(v => `<tr class="visit-row" data-id="${v.id}">
    <td style="color:var(--text-subtle);white-space:nowrap">${v.visited_at?.slice(0,16).replace('T',' ')}</td>
    <td style="word-break:break-all;max-width:240px;font-size:.75rem">${esc(v.page_url)}</td>
    <td>${v.vk_id ? `<code>${esc(v.vk_id)}</code>` : '<span style="color:var(--text-subtle)">—</span>'}</td>
    <td style="color:var(--text-subtle)">${v.binding_id || '—'}</td>
    <td>${v.success
      ? '<span class="badge badge--ok">OK</span>'
      : `<span class="badge badge--bad">ошибка</span>`}</td>
  </tr>`).join('');
  tb.querySelectorAll('.visit-row').forEach(row => {
    row.addEventListener('click', () => openVisitDetail(row));
  });
}

async function openVisitDetail(row) {
  if (_activeVisitRow === row) { closeVisitDetail(); return; }
  if (_activeVisitRow) _activeVisitRow.classList.remove('visit-row--active');
  _activeVisitRow = row;
  row.classList.add('visit-row--active');

  const vid = row.dataset.id;
  const r = await fetch(API + `/visits/${vid}`).catch(() => null);
  if (!r?.ok) return;
  const v = await r.json();

  const d = v.details || {};
  document.getElementById('vdTitle').textContent = `Визит #${v.id} — ${v.visited_at?.slice(0,16).replace('T',' ')}`;

  const errEl = document.getElementById('vdError');
  if (v.error) { errEl.textContent = v.error; errEl.hidden = false; }
  else { errEl.hidden = true; }

  const rows = [
    ['VK ID',     v.vk_id || '—'],
    ['Страница',  v.page_url],
    ['Связка ID', v.binding_id || '—'],
    ['IP',        v.ip || '—'],
    ['Статус',    v.success ? 'успех' : 'ошибка'],
  ];

  let html = `<div class="vd-kv">${rows.map(([k,val]) =>
    `<span class="vd-key">${esc(k)}</span><span class="vd-val">${esc(String(val))}</span>`
  ).join('')}</div>`;

  if (d.http_status !== undefined) {
    html += `<div class="vd-kv">
      <span class="vd-key">HTTP статус</span>
      <span class="vd-val" style="color:${d.http_status === 200 ? 'var(--ok)' : 'var(--bad)'}">${d.http_status}</span>
    </div>`;
  }

  if (d.response !== undefined) {
    const resp = typeof d.response === 'string' ? d.response : JSON.stringify(d.response, null, 2);
    html += `<div style="color:var(--text-subtle);font-size:.74rem;margin-bottom:2px">Ответ Senler</div>
             <pre class="vd-pre">${esc(resp)}</pre>`;
  }

  if (d.reason) {
    html += `<div class="vd-kv">
      <span class="vd-key">Причина</span><span class="vd-val">${esc(d.reason)}</span>
    </div>`;
  }

  document.getElementById('vdDetails').innerHTML = html;
  document.getElementById('visitDetail').hidden = false;
}

function closeVisitDetail() {
  if (_activeVisitRow) { _activeVisitRow.classList.remove('visit-row--active'); _activeVisitRow = null; }
  document.getElementById('visitDetail').hidden = true;
}

document.getElementById('vdClose').addEventListener('click', closeVisitDetail);

function renderScript() {
  document.getElementById('scriptBox').textContent =
`<script>
(function(){
  if(window.__nxt)return;window.__nxt=1;
  try{
    var u=location.origin+location.pathname,p={},q=location.search.slice(1);
    if(q)q.split('&').forEach(function(s){
      var i=s.indexOf('=');if(i<1)return;
      try{p[decodeURIComponent(s.slice(0,i))]=decodeURIComponent(s.slice(i+1));}catch(e){}
    });
    if(typeof fetch==='function')fetch('${TRACK_URL}',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url:u,params:p}),keepalive:true,mode:'cors'
    }).catch(function(){});
  }catch(e){}
})();
<\/script>`;
}

document.getElementById('copyScriptBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('scriptBox').textContent)
    .then(() => {
      document.getElementById('copyScriptBtn').textContent = 'Скопировано ✓';
      setTimeout(() => { document.getElementById('copyScriptBtn').textContent = 'Скопировать'; }, 2000);
    });
});

function esc(s) { return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadEnvCheck();
loadPages();
loadBindings();
</script>
</body>
</html>
